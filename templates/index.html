<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaranara Smart Farm</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Smart Farm Relay Controller</h1>
      <p id="modeText">상태 확인 중...</p>
    </header>

    <section id="channels" class="channels" data-channel-count="{{ channel_count }}"></section>
  </main>

  <div id="keypadModal" class="modal hidden">
    <div class="modal-card">
      <h2>숫자 입력</h2>
      <p id="keypadTarget"></p>
      <div class="keypad-grid" id="keypadGrid"></div>
      <div class="keypad-actions">
        <button id="kpClear" class="btn">지우기</button>
        <button id="kpBack" class="btn">한 글자 삭제</button>
        <button id="kpDone" class="btn primary">완료</button>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>

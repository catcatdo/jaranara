<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자라나라 스마트팜</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>자라나라 스마트팜</h1>
      <p id="modeText">상태 확인 중...</p>
    </header>

    <section class="workspace">
      <section id="channels" class="channels" data-channel-count="{{ channel_count }}"></section>

      <aside class="keypad-panel">
        <h2>숫자 키패드</h2>
        <p id="keypadTarget">입력할 분/초 칸을 먼저 선택하세요.</p>
        <div class="keypad-grid" id="keypadGrid"></div>
        <div class="keypad-actions">
          <button id="kpClear" class="btn">지우기</button>
          <button id="kpBack" class="btn">한 글자 삭제</button>
        </div>
      </aside>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
